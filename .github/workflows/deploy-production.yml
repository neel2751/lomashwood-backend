name: Deploy Production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      confirm:
        description: Type "deploy" to confirm production deployment
        required: true

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9"

jobs:
  guard:
    name: Deployment Guard
    runs-on: ubuntu-latest
    steps:
      - name: Validate manual trigger confirmation
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "deploy" ]; then
            echo "Deployment not confirmed. Aborting."
            exit 1
          fi

  test:
    name: Pre-deploy Tests
    runs-on: ubuntu-latest
    needs: guard
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm type-check

      - run: pnpm test --ci

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
    concurrency:
      group: production-deploy
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build app
        run: pnpm build

      - name: Upload source to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          password: ${{ secrets.DROPLET_PASSWORD }}
          port: 22
          source: "."
          target: "/tmp/lomashwood-production-${{ github.sha }}"

      - name: Deploy on DigitalOcean droplet
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          password: ${{ secrets.DROPLET_PASSWORD }}
          port: 22
          script: |
            set -e
            mkdir -p "/opt/lomashwood/production-app"
            cp -a "/tmp/lomashwood-production-${{ github.sha }}/." "/opt/lomashwood/production-app/"
            if [ ! -f "/opt/lomashwood/.env.production" ]; then
              echo "Missing env file: /opt/lomashwood/.env.production"
              exit 1
            fi
            if ! grep -Eq '^DATABASE_URL=' "/opt/lomashwood/.env.production"; then
              echo "DATABASE_URL is missing in /opt/lomashwood/.env.production"
              exit 1
            fi
            docker network create appnet || true
            cd "/opt/lomashwood/production-app"
            docker build -t lomash-wood-admin:production .
            docker run --rm \
              --network appnet \
              --env-file "/opt/lomashwood/.env.production" \
              lomash-wood-admin:production \
              prisma migrate deploy --schema=prisma/schema.prisma
            docker rm -f lomash-wood-admin || true
            docker run -d \
              --name lomash-wood-admin \
              --restart unless-stopped \
              --network appnet \
              -p 3000:3000 \
              --env-file "/opt/lomashwood/.env.production" \
              lomash-wood-admin:production
            curl -fsS http://127.0.0.1:3000/api/health

      - name: Create GitHub Release Tag
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString().slice(0,10).replace(/-/g,'');
            const run = context.runNumber;
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/prod-${date}-${run}`,
              sha: context.sha
            });
