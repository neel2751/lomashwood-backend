name: Deploy Production

on:
  push:
    branches: [main]

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5 # Updated to v5 (more stable)
        with:
          submodules: recursive

      - name: Upload to Droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          password: ${{ secrets.DROPLET_PASSWORD }}
          source: "."
          target: "/opt/lomashwood/production-app"

      - name: SSH Remote Commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          password: ${{ secrets.DROPLET_PASSWORD }}
          script: |
            cd /opt/lomashwood/production-app

            # Ensure network exists
            docker network create appnet || true

            # Build the new image
            docker build -t lomash-wood-admin:production .

            # Stop and restart the app
            docker stop lomash-wood-admin || true
            docker rm lomash-wood-admin || true

            docker run -d \
              --name lomash-wood-admin \
              --network appnet \
              --restart unless-stopped \
              -p 3000:3000 \
              -e RUN_DB_SEED="false" \
              --env-file /opt/lomashwood/.env.production \
              lomash-wood-admin:production
