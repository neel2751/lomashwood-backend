name: Deploy Production

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    permissions:
      contents: read
    concurrency:
      group: production-deploy
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Upload source to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          password: ${{ secrets.DROPLET_PASSWORD }}
          port: 22
          source: "."
          target: "/tmp/lomashwood-production-${{ github.sha }}"

      - name: Deploy on DigitalOcean droplet
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          password: ${{ secrets.DROPLET_PASSWORD }}
          port: 22
          script: |
            set -e
            if ! command -v docker >/dev/null 2>&1; then
              echo "Docker not found. Installing Docker..."
              if command -v sudo >/dev/null 2>&1; then
                curl -fsSL https://get.docker.com | sudo sh
              else
                curl -fsSL https://get.docker.com | sh
              fi
            fi

            DOCKER="docker"
            if ! docker info >/dev/null 2>&1; then
              if command -v sudo >/dev/null 2>&1; then
                DOCKER="sudo docker"
              else
                echo "Docker is installed but not accessible for current user"
                exit 1
              fi
            fi

            APP_DIR="/opt/lomashwood/production-app"
            ENV_FILE="/opt/lomashwood/.env.production"

            mkdir -p "/opt/lomashwood"
            mkdir -p "$APP_DIR"
            cp -a "/tmp/lomashwood-production-${{ github.sha }}/." "$APP_DIR/"
            if [ ! -f "$ENV_FILE" ]; then
              echo "Missing env file: $ENV_FILE"
              echo "Create it manually on droplet and rerun deploy"
              exit 1
            fi
            if ! grep -Eq '^DATABASE_URL=' "$ENV_FILE"; then
              echo "DATABASE_URL is missing in $ENV_FILE"
              exit 1
            fi
            $DOCKER network create appnet || true
            cd "$APP_DIR"
            $DOCKER build -t lomash-wood-admin:production .
            $DOCKER rm -f lomash-wood-admin || true
            $DOCKER run -d \
              --name lomash-wood-admin \
              --restart unless-stopped \
              --network appnet \
              -p 3000:3000 \
              --env-file "$ENV_FILE" \
              lomash-wood-admin:production
            curl -fsS http://127.0.0.1:3000/api/health
