name: Deploy Production

on:
  push:
    branches: [main]

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # Updated to v4 (more stable)
        with:
          submodules: recursive

      - name: Upload to Droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          password: ${{ secrets.DROPLET_PASSWORD }}
          source: "."
          target: "/opt/lomashwood/production-app"

      - name: SSH Remote Commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          password: ${{ secrets.DROPLET_PASSWORD }}
          script: |
            # 1. Ensure the network and volumes exist
            docker network create appnet || true
            docker volume create pgdata || true

            # 2. Start/Restart the Postgres Database
            # We use these exact envs to match your DATABASE_URL
            if ! docker ps -a --format '{{.Names}}' | grep -q '^postgres$'; then
              docker run -d \
                --name postgres \
                --network appnet \
                --restart unless-stopped \
                -e POSTGRES_USER=postgres \
                -e POSTGRES_PASSWORD=postgres \
                -e POSTGRES_DB=postgres \
                -v pgdata:/var/lib/postgresql/data \
                postgres:16-alpine
            fi

            # 3. Go to app folder and build
            cd /opt/lomashwood/production-app
            docker build -t lomash-wood-admin:production .

            # 4. Refresh the App Container
            docker stop lomash-wood-admin || true
            docker rm lomash-wood-admin || true

            docker run -d \
              --name lomash-wood-admin \
              --network appnet \
              --restart unless-stopped \
              -p 3000:3000 \
              --env-file /opt/lomashwood/.env.production \
              lomash-wood-admin:production
