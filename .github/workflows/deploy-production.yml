name: Deploy Production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      confirm:
        description: Type "deploy" to confirm production deployment
        required: true

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  guard:
    name: Deployment Guard
    runs-on: ubuntu-latest
    steps:
      - name: Validate manual trigger confirmation
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "deploy" ]; then
            echo "Deployment not confirmed. Aborting."
            exit 1
          fi

  test:
    name: Pre-deploy Tests
    runs-on: ubuntu-latest
    needs: guard
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}

      - run: pnpm install --no-frozen-lockfile

      - run: pnpm lint

      - run: pnpm type-check

      - run: pnpm run test:ci

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
    concurrency:
      group: production-deploy
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}

      - run: pnpm install --no-frozen-lockfile

      - name: Build app
        run: pnpm build

      - name: Upload source to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          password: ${{ secrets.DROPLET_PASSWORD }}
          port: 22
          source: "."
          target: "/tmp/lomashwood-production-${{ github.sha }}"

      - name: Deploy on DigitalOcean droplet
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          password: ${{ secrets.DROPLET_PASSWORD }}
          port: 22
          script: |
            set -e
            if ! command -v docker >/dev/null 2>&1; then
              echo "Docker not found. Installing Docker..."
              if command -v sudo >/dev/null 2>&1; then
                curl -fsSL https://get.docker.com | sudo sh
              else
                curl -fsSL https://get.docker.com | sh
              fi
            fi

            DOCKER="docker"
            if ! docker info >/dev/null 2>&1; then
              if command -v sudo >/dev/null 2>&1; then
                DOCKER="sudo docker"
              else
                echo "Docker is installed but not accessible for current user"
                exit 1
              fi
            fi

            mkdir -p "/opt/lomashwood"
            mkdir -p "/opt/lomashwood/production-app"
            cp -a "/tmp/lomashwood-production-${{ github.sha }}/." "/opt/lomashwood/production-app/"
            if [ ! -f "/opt/lomashwood/.env.production" ]; then
              if [ -n "${{ secrets.PRODUCTION_ENV_FILE_CONTENT }}" ]; then
                printf "%s" "${{ secrets.PRODUCTION_ENV_FILE_CONTENT }}" > "/opt/lomashwood/.env.production"
                chmod 600 "/opt/lomashwood/.env.production"
                echo "Created /opt/lomashwood/.env.production from PRODUCTION_ENV_FILE_CONTENT secret"
              else
                echo "Missing env file: /opt/lomashwood/.env.production"
                echo "Set secret PRODUCTION_ENV_FILE_CONTENT or create the file manually on droplet"
                exit 1
              fi
            fi
            if ! grep -Eq '^DATABASE_URL=' "/opt/lomashwood/.env.production"; then
              echo "DATABASE_URL is missing in /opt/lomashwood/.env.production"
              exit 1
            fi
            $DOCKER network create appnet || true
            cd "/opt/lomashwood/production-app"
            $DOCKER build -t lomash-wood-admin:production .
            $DOCKER run --rm \
              --network appnet \
              --env-file "/opt/lomashwood/.env.production" \
              lomash-wood-admin:production \
              prisma migrate deploy --schema=prisma/schema.prisma
            $DOCKER rm -f lomash-wood-admin || true
            $DOCKER run -d \
              --name lomash-wood-admin \
              --restart unless-stopped \
              --network appnet \
              -p 3000:3000 \
              --env-file "/opt/lomashwood/.env.production" \
              lomash-wood-admin:production
            curl -fsS http://127.0.0.1:3000/api/health

      - name: Create GitHub Release Tag
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString().slice(0,10).replace(/-/g,'');
            const run = context.runNumber;
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/prod-${date}-${run}`,
              sha: context.sha
            });
