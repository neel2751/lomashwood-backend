version: '3.8'

services:
  # Database
  postgres:
    image: postgres:15-alpine
    container_name: lomashwood-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: lomashwood
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    networks:
      - lomashwood-network

  # Redis for caching and sessions
  redis:
    image: redis:7-alpine
    container_name: lomashwood-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - lomashwood-network

  # API Gateway
  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    container_name: lomashwood-api-gateway
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/lomashwood
      REDIS_URL: redis://redis:6379
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      AUTH_SERVICE_URL: http://auth-service:3001
      PRODUCT_SERVICE_URL: http://product-service:3002
      ORDER_SERVICE_URL: http://order-service:3003
      APPOINTMENT_SERVICE_URL: http://appointment-service:3004
      CUSTOMER_SERVICE_URL: http://customer-service:3005
      CONTENT_SERVICE_URL: http://content-service:3006
      NOTIFICATION_SERVICE_URL: http://notification-service:3007
      ANALYTICS_SERVICE_URL: http://analytics-service:3008
      UPLOAD_SERVICE_URL: http://upload-service:3009
    depends_on:
      - postgres
      - redis
      - auth-service
      - product-service
    networks:
      - lomashwood-network

  # Auth Service
  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    container_name: lomashwood-auth-service
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/lomashwood
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_USER: your-email@gmail.com
      SMTP_PASS: your-app-password
      EMAIL_FROM: noreply@lomashwood.com
    depends_on:
      - postgres
    networks:
      - lomashwood-network

  # Product Service
  product-service:
    build:
      context: .
      dockerfile: services/product-service/Dockerfile
    container_name: lomashwood-product-service
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: development
      PORT: 3002
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/lomashwood
      REDIS_URL: redis://redis:6379
      UPLOAD_SERVICE_URL: http://upload-service:3009
    depends_on:
      - postgres
      - redis
    networks:
      - lomashwood-network

  # Order Service
  order-service:
    build:
      context: .
      dockerfile: services/order-service/Dockerfile
    container_name: lomashwood-order-service
    restart: unless-stopped
    ports:
      - "3003:3003"
    environment:
      NODE_ENV: development
      PORT: 3003
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/lomashwood
      REDIS_URL: redis://redis:6379
      RAZORPAY_KEY_ID: your-razorpay-key-id
      RAZORPAY_KEY_SECRET: your-razorpay-key-secret
    depends_on:
      - postgres
      - redis
    networks:
      - lomashwood-network

  # Appointment Service
  appointment-service:
    build:
      context: .
      dockerfile: services/appointment-service/Dockerfile
    container_name: lomashwood-appointment-service
    restart: unless-stopped
    ports:
      - "3004:3004"
    environment:
      NODE_ENV: development
      PORT: 3004
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/lomashwood
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_USER: your-email@gmail.com
      SMTP_PASS: your-app-password
      EMAIL_FROM: noreply@lomashwood.com
    depends_on:
      - postgres
    networks:
      - lomashwood-network

  # Customer Service
  customer-service:
    build:
      context: .
      dockerfile: services/customer-service/Dockerfile
    container_name: lomashwood-customer-service
    restart: unless-stopped
    ports:
      - "3005:3005"
    environment:
      NODE_ENV: development
      PORT: 3005
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/lomashwood
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis
    networks:
      - lomashwood-network

  # Content Service
  content-service:
    build:
      context: .
      dockerfile: services/content-service/Dockerfile
    container_name: lomashwood-content-service
    restart: unless-stopped
    ports:
      - "3006:3006"
    environment:
      NODE_ENV: development
      PORT: 3006
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/lomashwood
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis
    networks:
      - lomashwood-network

  # Notification Service
  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    container_name: lomashwood-notification-service
    restart: unless-stopped
    ports:
      - "3007:3007"
    environment:
      NODE_ENV: development
      PORT: 3007
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/lomashwood
      REDIS_URL: redis://redis:6379
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_USER: your-email@gmail.com
      SMTP_PASS: your-app-password
      EMAIL_FROM: noreply@lomashwood.com
    depends_on:
      - postgres
      - redis
    networks:
      - lomashwood-network

  # Analytics Service
  analytics-service:
    build:
      context: .
      dockerfile: services/analytics-service/Dockerfile
    container_name: lomashwood-analytics-service
    restart: unless-stopped
    ports:
      - "3008:3008"
    environment:
      NODE_ENV: development
      PORT: 3008
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/lomashwood
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis
    networks:
      - lomashwood-network

  # Upload Service
  upload-service:
    build:
      context: .
      dockerfile: services/upload-service/Dockerfile
    container_name: lomashwood-upload-service
    restart: unless-stopped
    ports:
      - "3009:3009"
    environment:
      NODE_ENV: development
      PORT: 3009
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/lomashwood
      REDIS_URL: redis://redis:6379
      AWS_ACCESS_KEY_ID: your-aws-access-key
      AWS_SECRET_ACCESS_KEY: your-aws-secret-key
      AWS_REGION: us-east-1
      AWS_S3_BUCKET: lomashwood-uploads
    depends_on:
      - postgres
      - redis
    volumes:
      - ./uploads:/app/uploads
    networks:
      - lomashwood-network

volumes:
  postgres_data:
  redis_data:

networks:
  lomashwood-network:
    driver: bridge
