version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: lomashwood_production
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_prod_data:/data
    restart: unless-stopped

  api-gateway:
    image: lomashwood/api-gateway:latest
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  auth-service:
    image: lomashwood/auth-service:latest
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  product-service:
    image: lomashwood/product-service:latest
    environment:
      NODE_ENV: production
      DB_HOST: postgres
    depends_on:
      - postgres
    restart: unless-stopped

  notification-service:
    image: lomashwood/notification-service:latest
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  analytics-service:
    image: lomashwood/analytics-service:latest
    environment:
      NODE_ENV: production
      DB_HOST: postgres
    depends_on:
      - postgres
    restart: unless-stopped

  upload-service:
    image: lomashwood/upload-service:latest
    environment:
      NODE_ENV: production
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: us-east-1
    restart: unless-stopped

volumes:
  postgres_prod_data:
  redis_prod_data:
