# ServiceMonitor for Prometheus monitoring
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: lomashwood-services
  namespace: lomashwood
  labels:
    app: lomashwood
spec:
  selector:
    matchLabels:
      app: api-gateway
  endpoints:
  - port: http
    path: /metrics
    interval: 30s
---
# PodMonitor for additional monitoring
---
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: lomashwood-pods
  namespace: lomashwood
  labels:
    app: lomashwood
spec:
  selector:
    matchLabels:
      app: api-gateway
  podMetricsEndpoints:
  - port: http
    path: /metrics
    interval: 30s
---
# PrometheusRule for alerting
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: lomashwood-alerts
  namespace: lomashwood
  labels:
    app: lomashwood
spec:
  groups:
  - name: lomashwood.rules
    rules:
    - alert: ServiceDown
      expr: up{job="lomashwood"} == 0
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "Service {{ $labels.service }} is down"
        description: "Service {{ $labels.service }} has been down for more than 1 minute."
    - alert: HighErrorRate
      expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.1
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "High error rate on {{ $labels.service }}"
        description: "Error rate is {{ $value | humanizePercentage }} on service {{ $labels.service }}."
    - alert: HighResponseTime
      expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 1
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "High response time on {{ $labels.service }}"
        description: "95th percentile response time is {{ $value }}s on service {{ $labels.service }}."
    - alert: HighMemoryUsage
      expr: container_memory_usage_bytes / container_spec_memory_limit_bytes > 0.9
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "High memory usage on {{ $labels.pod }}"
        description: "Memory usage is {{ $value | humanizePercentage }} on pod {{ $labels.pod }}."
    - alert: HighCPUUsage
      expr: rate(container_cpu_usage_seconds_total[5m]) / container_spec_cpu_quota * 100 > 80
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "High CPU usage on {{ $labels.pod }}"
        description: "CPU usage is {{ $value }}% on pod {{ $labels.pod }}."
