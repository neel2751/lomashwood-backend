apiVersion: v1
kind: Secret
metadata:
  name: lomashwood-secrets
  namespace: lomashwood
type: Opaque
data:
  # Base64 encoded values
  # Use: echo -n "your-secret" | base64
  DATABASE_URL: <base64-encoded-database-url>
  REDIS_URL: <base64-encoded-redis-url>
  JWT_SECRET: <base64-encoded-jwt-secret>
  JWT_REFRESH_SECRET: <base64-encoded-jwt-refresh-secret>
  SMTP_USER: <base64-encoded-smtp-user>
  SMTP_PASS: <base64-encoded-smtp-password>
  AWS_ACCESS_KEY_ID: <base64-encoded-aws-access-key>
  AWS_SECRET_ACCESS_KEY: <base64-encoded-aws-secret>
  FIREBASE_SERVICE_ACCOUNT_KEY: <base64-encoded-firebase-key>
  TWILIO_ACCOUNT_SID: <base64-encoded-twilio-sid>
  TWILIO_AUTH_TOKEN: <base64-encoded-twilio-token>
  TWILIO_FROM_NUMBER: <base64-encoded-twilio-number>
  RAZORPAY_KEY_ID: <base64-encoded-razorpay-key>
  RAZORPAY_KEY_SECRET: <base64-encoded-razorpay-secret>
  STRIPE_SECRET_KEY: <base64-encoded-stripe-secret>
