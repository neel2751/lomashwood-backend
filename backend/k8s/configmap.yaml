apiVersion: v1
kind: ConfigMap
metadata:
  name: lomashwood-config
  namespace: lomashwood
data:
  NODE_ENV: "production"
  LOG_LEVEL: "info"
  CORS_ORIGIN: "https://lomashwood.com,https://www.lomashwood.com"
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  DATABASE_HOST: "postgres-service"
  DATABASE_PORT: "5432"
  DATABASE_NAME: "lomashwood"
  JWT_ISSUER: "lomashwood-auth"
  JWT_AUDIENCE: "lomashwood-app"
  SMTP_HOST: "smtp.gmail.com"
  SMTP_PORT: "587"
  EMAIL_FROM: "noreply@lomashwood.com"
  AWS_REGION: "us-east-1"
  AWS_S3_BUCKET: "lomashwood-uploads"
  FIREBASE_PROJECT_ID: "lomashwood-app"
